<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sowz33's 2048 Game</title>
    <style>
        body { font-family: sans-serif; background: #faf8ef; text-align: center; color: #776e65; }
        .grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; width: 280px; background: #bbada0; padding: 8px; border-radius: 6px; margin: 15px auto; }
        .cell { width: 62px; height: 62px; background: #cdc1b4; border-radius: 4px; font-size: 14px; font-weight: bold; display: flex; align-items: center; justify-content: center; }
        .shop { background: #edefed; padding: 12px; max-width: 280px; margin: 15px auto; border-radius: 6px; border: 2px solid #bbada0; }
        button { background: #8f7a66; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-weight: bold; cursor: pointer; margin: 4px; }
        button:disabled { background: #d6cfc7; cursor: not-allowed; }
    </style>
</head>
<body>
    <h2>Sowz33's 2048: Upgrade Edition</h2>
    <div>SCORE: <strong id="sc">0</strong> | BEST: <strong id="hi">0</strong></div>
    
    <div class="grid" id="bd"></div>
    <button onclick="resetGrid()">Clear Board (Save Points)</button>

    <div class="shop">
        <h3>Upgrade Shop</h3>
        <div>Spawn Min: <strong id="lbl-sp">2</strong></div>
        <button id="btn-sp" onclick="buy('sp')">Upgrade (Cost: 400)</button>
        <div style="margin-top:8px;">Lucky 4 Chance: <strong id="lbl-ch">10%</strong></div>
        <button id="btn-ch" onclick="buy('ch')">Upgrade (Cost: 200)</button>
    </div>

    <script>
        let board = [], score = 0, hi = 0, lvSp = 1, lvCh = 1;
        const prices = { sp:, ch: [200, 500, 1200, 2500] };
        const minValues =;
        const oddsValues = [0.1, 0.25, 0.45, 0.7, 0.9];
        const oddsLabels = ["10%", "25%", "45%", "70%", "90%"];

        const colors = {
            2: { text: "#776e65", bg: "#eee4da" }, 4: { text: "#776e65", bg: "#ede0c8" },
            8: { text: "#f9f6f2", bg: "#f2b179" }, 16: { text: "#f9f6f2", bg: "#f59563" },
            32: { text: "#f9f6f2", bg: "#f67c5f" }, 64: { text: "#f9f6f2", bg: "#f65e3b" },
            128: { text: "#f9f6f2", bg: "#edcf72" }, 256: { text: "#f9f6f2", bg: "#edcc61" },
            512: { text: "#f9f6f2", bg: "#edc850" }, 1024: { text: "#f9f6f2", bg: "#edc53f" },
            2048: { text: "#f9f6f2", bg: "#edc22e" }, 4096: { text: "#ffffff", bg: "#b586b4" },
            8192: { text: "#ffffff", bg: "#a861ab" }, 16384: { text: "#ffffff", bg: "#a048a3" },
            32768: { text: "#ffffff", bg: "#800080" }, 65536: { text: "#ffffff", bg: "#600046" },
            131072: { text: "#ffffff", bg: "#8b86e3" }, 262144: { text: "#ffffff", bg: "#7766e9" },
            524288: { text: "#ffffff", bg: "#6751ec" }, 1048576: { text: "#ffffff", bg: "#4f3df1" },
            2097152: { text: "#ffffff", bg: "#261df9" }, 4194304: { text: "#ffffff", bg: "#92918d" },
            8388608: { text: "#ffffff", bg: "#676664" }, 16777216: { text: "#ffffff", bg: "#484846" },
            33554432: { text: "#ffffff", bg: "#3a3937" }, 67108864: { text: "#ffffff", bg: "#343432" },
            134217728: { text: "#ffffff", bg: "#1f1f1d" }, 268435456: { text: "#ffffff", bg: "#161616" },
            536870912: { text: "#ffffff", bg: "#0b0b0b" }, 1073741824: { text: "#ffffff", bg: "#050505" },
            2147483648: { text: "#ffffff", bg: "#ff2702" }
        };

        document.addEventListener("DOMContentLoaded", () => {
            try {
                if (localStorage.getItem("s2048_sc")) {
                    score = parseInt(localStorage.getItem("s2048_sc")) || 0;
                    hi = parseInt(localStorage.getItem("s2048_hi")) || 0;
                    lvSp = parseInt(localStorage.getItem("s2048_lsp")) || 1;
                    lvCh = parseInt(localStorage.getItem("s2048_lch")) || 1;
                    board = JSON.parse(localStorage.getItem("s2048_bd"));
                }
            } catch(e) {
                localStorage.clear();
            }
            if (!board || board.length !== 4 || !Array.isArray(board[0])) resetGrid(); else render();
            document.addEventListener("keydown", e => handleMove(e.key));
        });

        function resetGrid() {
            board = Array(4).fill().map(() => Array(4).fill(0));
            spawn(); spawn(); render();
        }

        function spawn() {
            let empty = [];
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    if (board[r][c] === 0) empty.push({r, c});
                }
            }
            if (!empty.length) return;
            let cell = empty[Math.floor(Math.random() * empty.length)];
            let min = minValues[lvSp - 1] || 2;
            let odds = oddsValues[lvCh - 1] || 0.1;
            board[cell.r][cell.c] = Math.random() < odds ? min * 2 : min;
        }

        function render() {
            const bd = document.getElementById("bd"); bd.innerHTML = "";
            for (let r = 0; r < 4; r++) {
                for (let c = 0; c < 4; c++) {
                    let v = board[r][c], div = document.createElement("div");
                    div.className = "cell";
                    if (v > 0) {
                        let style = colors[v] || { text: "#ffffff", bg: "#ff2702" };
                        div.style.color = style.text;
                        div.style.backgroundColor = style.bg;
                        div.innerText = v >= 1000000 ? (v / 1000000).toFixed(1) + "M" : v;
                    } else {
                        div.style.backgroundColor = "#cdc1b4";
                    }
                    bd.appendChild(div);
                }
            }
            if (score > hi) hi = score;
            document.getElementById("sc").innerText = score;
            document.getElementById("hi").innerText = hi;

            let costSp = prices.sp[lvSp - 1];
            document.getElementById("lbl-sp").innerText = minValues[lvSp - 1] || 32;
            document.getElementById("btn-sp").innerText = costSp ? `Upgrade (Cost: ${costSp})` : "MAX";
            document.getElementById("btn-sp").disabled = !costSp || score < costSp;

            let costCh = prices.ch[lvCh - 1];
            document.getElementById("lbl-ch").innerText = oddsLabels[lvCh - 1] || "90%";
            document.getElementById("btn-ch").innerText = costCh ? `Upgrade (Cost: ${costCh})` : "MAX";
            document.getElementById("btn-ch").disabled = !costCh || score < costCh;

            localStorage.setItem("s2048_sc", score); localStorage.setItem("s2048_hi", hi);
            localStorage.setItem("s2048_lsp", lvSp); localStorage.setItem("s2048_lch", lvCh);
            localStorage.setItem("s2048_bd", JSON.stringify(board));
        }

        function buy(type) {
            let cost = type === "sp" ? prices.sp[lvSp - 1] : prices.ch[lvCh - 1];
            if (cost && score >= cost) {
                score -= cost;
                if (type === "sp") lvSp++; else lvCh++;
                render();
            }
        }

        function slide(row) {
            let arr = row.filter(v => v !== 0);
            for (let i = 0; i < arr.length - 1; i++) {
                if (arr[i] === arr[i + 1]) { arr[i] *= 2; score += arr[i]; arr[i + 1] = 0; }
            }
            arr = arr.filter(v => v !== 0);
            while (arr.length < 4) arr.push(0);
            return arr;
        }

        function handleMove(key) {
            let s = JSON.stringify(board);
            if (key === "ArrowLeft" || key === "ArrowRight") {
                for (let r = 0; r < 4; r++) {
                    if (key === "ArrowRight") board[r].reverse();
                    board[r] = slide(board[r]);
                    if (key === "ArrowRight") board[r].reverse();
                }
            } else if (key === "ArrowUp" || key === "ArrowDown") {
                for (let c = 0; c < 4; c++) {
                    let col = [board[0][c], board[1][c], board[2][c], board[3][c]];
                    if (key === "ArrowDown") col.reverse();
                    col = slide(col);
                    if (key === "ArrowDown") col.reverse();
                    for (let r = 0; r < 4; r++) board[r][c] = col[r];
                }
            } else return;

            if (s !== JSON.stringify(board)) { spawn(); render(); }
        }
    </script>
</body>
</html>
